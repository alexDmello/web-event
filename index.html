<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taaffeite Events | Luxury Event Planning & Design</title>
  <meta name="description"
    content="Taaffeite is a high-end luxury events planning agency specializing in elegant, warm, and minimal celebrations. Named after one of the rarest gemstones in the world." />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Google Fonts: loaded asynchronously so fonts never block first paint -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" /></noscript>
  <!-- LCP image preload with correct sizes hint so the browser fetches at the right resolution -->
  <link rel="preload" as="image" href="/assets/05 PHOTOS/Proposal/0039.webp" fetchpriority="high" imagesizes="100vw" />
  <!-- Logo WebP preload — used in both loader and hero -->
  <link rel="preload" as="image" href="/assets/images/logo.webp" fetchpriority="high" imagesizes="300px" />
  <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v15/QGYyz_MVcBeNP4NjuGObqx1XmO1I4W61C4E.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v15/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC1C4E.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <link rel="preload" href="https://fonts.gstatic.com/s/playfairdisplay/v40/nuFvD-vYSZviVYUb_rj3ij__anPXJzDwcbmjWBN2PKdFvUDQ.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <link rel="preload" href="https://fonts.gstatic.com/s/playfairdisplay/v40/nuFvD-vYSZviVYUb_rj3ij__anPXJzDwcbmjWBN2PKd3vUDQ.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <style>
    /* ─── Global Loader ─── */
    .global-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #fdfdfd;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    /* ─── Logo: WebP image (tiny now at ~40KB) ─── */
    .loader-logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      opacity: 0;
      animation: logoFadeIn 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.1s forwards;
    }

    @media (max-width: 768px) {
      .loader-logo {
        width: 100px;
        height: 100px;
      }
    }

    @keyframes logoFadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ─── Elegant CSS progress bar (replaces the GIF animation) ─── */
    .loader-bar-track {
      width: 120px;
      height: 1px;
      background: rgba(197, 160, 89, 0.18);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: barAppear 0.5s ease 0.5s forwards;
    }

    @keyframes barAppear {
      to { opacity: 1; }
    }

    .loader-bar-fill {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #c5a059, transparent);
      animation: barShimmer 1.4s ease-in-out infinite;
    }

    @keyframes barShimmer {
      0%   { left: -100%; }
      100% { left: 100%; }
    }

    /* ─── Fade-out sequence ─── */
    .global-loader.fade-out-content .loader-logo,
    .global-loader.fade-out-content .loader-bar-track {
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* ─── Sliding panel out ─── */
    .global-loader.slide-up {
      transform: translateY(-100%);
    }
  </style>
</head>

<body>
  <!-- Global Loader -->
  <div id="global-loader" class="global-loader">
    <div class="loader-content">
      <!-- Logo now served as WebP (~40KB vs 637KB PNG) — no blocking GIF -->
      <img
        src="/assets/images/logo.webp"
        id="global-loader-logo"
        class="loader-logo"
        width="140"
        height="140"
        alt="Taaffeite Events"
        fetchpriority="high"
      >
      <!-- Pure CSS shimmer bar — zero bytes on the wire -->
      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      // Immediately lock page scrolling
      document.body.style.overflow = 'hidden';

      var loader = document.getElementById('global-loader');

      function dismissLoader() {
        if (!loader) return;
        loader.classList.add('fade-out-content');

        setTimeout(function () {
          if (loader) {
            loader.classList.add('slide-up');
          }
          document.body.style.overflow = '';

          // Clean up the DOM once the slide animation finishes
          setTimeout(function () {
            if (loader) loader.remove();
          }, 1200);
        }, 300);
      }

      // Expose globally so React App can trigger dismissal immediately on mount
      window.dismissGlobalLoader = dismissLoader;

      // Safety timeout fallback (2 seconds) in case React fails to mount
      setTimeout(dismissLoader, 2000);
    })();
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
